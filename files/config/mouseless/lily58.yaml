# devices:
# - "/dev/input/by-id/usb-*-event-kbd"

baseMouseSpeed: 750.0
baseScrollSpeed: 20.0

mouseAccelerationTime: 400.0
mouseAccelerationCurve: 1.0

startMouseSpeed: 0.0

mouseDecelerationTime: 300.0
mouseDecelerationCurve: 3.0

layers:
- name: initial
  bindings:
    f13: layer mouse

- name: mouse
  passThrough: false
  bindings:
    r: reload-config
    f13: layer initial

    l: move  1  0
    h: move -1  0
    j: move  0  1
    k: move  0 -1

    w: move  2  0
    b: move -2  0

    y: leftctrl+c
    c: leftctrl+leftshift+c
    v: leftctrl+leftshift+v

    p: scroll up
    n: scroll down

    u: speed 0.1
    i: speed 0.3
    o: speed 4.0

    f: button left
    d: button middle
    s: button right
