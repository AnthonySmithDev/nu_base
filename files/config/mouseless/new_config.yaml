devices:
- "/dev/input/by-id/usb-SINO_WEALTH_Gaming_KB-event-kbd"

baseMouseSpeed: 750.0
baseScrollSpeed: 20.0

mouseAccelerationTime: 400.0
mouseAccelerationCurve: 1.0

startMouseSpeed: 0.0

mouseDecelerationTime: 300.0
mouseDecelerationCurve: 3.0

layers:
- name: homerow
  bindings:
    esc: tap-hold esc ; capslock ; 400
    capslock: layer qwerty

    w: tap-hold-next w ; toggle-layer nav_left ; 200
    o: tap-hold-next o ; toggle-layer nav_right ; 200

    a: tap-hold-next a ; leftalt ; 200
    s: tap-hold-next s ; leftctrl ; 200
    d: tap-hold-next d ; leftshift ; 200
    f: tap-hold-next f ; leftmeta ; 200

    j: tap-hold-next j ; leftmeta ; 200
    k: tap-hold-next k ; leftshift ; 200
    l: tap-hold-next l ; leftctrl ; 200
    semicolon: tap-hold-next semicolon ; leftalt ; 200

    r: tap-hold-next r ; toggle-layer leftmeta_leftctrl ; 200
    e: tap-hold-next e ; toggle-layer leftmeta_leftalt ; 200

    u: tap-hold-next u ; toggle-layer leftmeta_leftctrl ; 200
    i: tap-hold-next i ; toggle-layer leftmeta_leftalt ; 200

- name: nav_left
  passThrough: true
  bindings:
    a: multi layer qwerty ; exec show --mode qwerty
    s: multi layer homerow ; exec show --mode homerow
    d: multi layer mouse ; exec show --mode mouse
    f: multi layer system ; exec show --mode system
    g: multi layer numpad ; exec show --mode numpad

- name: nav_right
  passThrough: true
  bindings:
    h: multi layer qwerty ; exec show --mode qwerty
    j: multi layer homerow ; exec show --mode homerow
    k: multi layer mouse ; exec show --mode mouse
    l: multi layer system ; exec show --mode system
    semicolon: multi layer numpad ; exec show --mode numpad

- name: leftmeta_leftctrl
  bindings:
    _: leftmeta+leftctrl+_

- name: leftmeta_leftalt
  bindings:
    _: leftmeta+leftalt+_

- name: qwerty
  passThrough: true
  bindings:
    f: tap-hold-next f ; toggle-layer nav_right ; 200
    semicolon: tap-hold-next semicolon ; toggle-layer nav_left ; 200

    esc: tap-hold esc ; capslock ; 400
    capslock: tap-hold-next esc ; leftctrl ; 200

- name: mouse
  passThrough: true
  bindings:
    esc: tap-hold esc ; capslock ; 400
    capslock: layer qwerty

    u: move -1 -1
    m: move  1  1

    o: move  1 -1
    n: move -1  1

    l: move  1  0
    h: move -1  0
    j: move  0  1
    k: move  0 -1

    w: move  2  0
    b: move -2  0

    y: multi leftctrl+c ; layer qwerty
    c: leftctrl+leftshift+c
    v: leftctrl+leftshift+v

    f: button left
    d: button middle
    s: button right

    leftshift: toggle-layer mouse_shift
    rightshift: toggle-layer mouse_shift

- name: mouse_shift
  passThrough: false
  bindings:
    j: scroll down
    k: scroll up

    w: move  4  0
    b: move -4  0

    a: speed 0.1
    s: speed 0.5
    d: speed 4
    f: speed 8
    g: speed 10

- name: system
  passThrough: true
  bindings:
    esc: tap-hold leftmeta ; capslock ; 400
    capslock: layer qwerty

    r: reload-config
    p: tap-hold p ; power ; 300

    h: mute
    j: volumedown
    k: volumeup

    u: tap-hold u ; exec poweroff ; 1000
    i: tap-hold i ; exec reboot ; 1000
    o: tap-hold o ; sleep ; 1000

- name: numpad
  passThrough: true
  bindings:
    esc: tap-hold leftmeta ; capslock ; 400
    capslock: layer qwerty

    q: k1
    w: k2
    e: k3
    r: k4
    t: k5
    y: k6
    u: k7
    i: k8
    o: k9
    p: k0
