devices:
- "/dev/input/by-id/usb-SINO_WEALTH_Gaming_KB-event-kbd"

baseMouseSpeed: 750.0
baseScrollSpeed: 20.0

mouseAccelerationTime: 400.0
mouseAccelerationCurve: 1.0

startMouseSpeed: 0.0

mouseDecelerationTime: 300.0
mouseDecelerationCurve: 3.0

layers:
- name: initial
  bindings:
    apostrophe: tap-hold apostrophe ; toggle-layer nav ; 200

    esc: tap-hold esc ; capslock ; 400
    capslock: tap-hold-next esc ; leftctrl ; 200

- name: nav
  passThrough: true
  bindings:
    r: multi reload-config ; exec show --mode config
    a: multi layer initial ; exec show --mode initial
    s: multi layer homerow ; exec show --mode homerow
    d: multi layer mouse ; exec show --mode mouse
    f: multi layer system ; exec show --mode system

- name: homerow
  passThrough: true
  bindings:
    apostrophe: tap-hold apostrophe ; toggle-layer nav ; 200

    esc: tap-hold esc ; capslock ; 400
    capslock: tap-hold-next esc ; leftctrl ; 200

    a: tap-hold-next a ; leftalt ; 150
    s: tap-hold-next s ; leftctrl ; 150
    d: tap-hold-next d ; leftshift ; 150
    f: tap-hold-next f ; leftmeta ; 150

    j: tap-hold-next j ; leftmeta ; 150
    k: tap-hold-next k ; leftshift ; 150
    l: tap-hold-next l ; leftctrl ; 150
    semicolon: tap-hold-next semicolon ; leftalt ; 150

    r: tap-hold-next r ; leftmeta+leftctrl ; 150
    e: tap-hold-next e ; leftmeta+leftalt ; 150

    u: tap-hold-next u ; rightmeta+rightctrl ; 150
    i: tap-hold-next i ; rightmeta+rightalt ; 150


- name: mouse
  passThrough: true
  bindings:
    apostrophe: tap-hold apostrophe ; toggle-layer nav ; 200

    esc: tap-hold esc ; capslock ; 400
    capslock: tap-hold-next esc ; leftctrl ; 200

    u: move -1 -1
    m: move  1  1

    o: move  1 -1
    n: move -1  1

    l: move  1  0
    h: move -1  0
    j: move  0  1
    k: move  0 -1

    w: move  2  0
    b: move -2  0

    y: leftctrl+c
    c: leftctrl+leftshift+c
    v: leftctrl+leftshift+v

    f: button left
    d: button middle
    s: button right

    leftshift: toggle-layer mouse_shift
    rightshift: toggle-layer mouse_shift

- name: mouse_shift
  passThrough: false
  bindings:
    j: scroll down
    k: scroll up

    w: move  4  0
    b: move -4  0

    a: speed 0.1
    s: speed 0.5
    d: speed 4
    f: speed 8
    g: speed 10

- name: system
  passThrough: true
  bindings:
    apostrophe: tap-hold apostrophe ; toggle-layer nav ; 200

    esc: tap-hold leftmeta ; capslock ; 400
    capslock: tap-hold-next esc ; leftctrl ; 200

    r: reload-config
    p: tap-hold p ; power ; 300

    h: mute
    j: volumedown
    k: volumeup

    u: tap-hold u ; exec poweroff ; 1000
    i: tap-hold i ; exec reboot ; 1000
    o: tap-hold o ; sleep ; 1000

- name: numpad
  passThrough: true
  bindings:
    q: k1
    w: k2
    e: k3
    r: k4
    t: k5
    y: k6
    u: k7
    i: k8
    o: k9
    p: k0
