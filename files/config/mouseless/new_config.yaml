devices:
- "/dev/input/by-id/usb-SINO_WEALTH_Gaming_KB-event-kbd"

baseMouseSpeed: 750.0
baseScrollSpeed: 20.0

mouseAccelerationTime: 400.0
mouseAccelerationCurve: 1.0

startMouseSpeed: 0.0

mouseDecelerationTime: 300.0
mouseDecelerationCurve: 3.0

layers:
- name: initial
  bindings:
    leftalt: tap-hold layer mouse ; toggle-layer system ; 200
    leftalt: tap-hold layer qwerty ; toggle-layer system ; 200

    leftshift: tap-hold-next layer mouse ; leftshift ; 200
    rightshift: tap-hold-next layer qwerty ; rightshift ; 200

    esc: tap-hold esc ; capslock ; 400
    capslock: tap-hold-next esc ; leftctrl ; 200

    a: tap-hold-next a ; leftalt ; 150
    s: tap-hold-next s ; leftctrl ; 150
    d: tap-hold-next d ; leftshift ; 150
    f: tap-hold-next f ; leftmeta ; 150

    j: tap-hold-next j ; leftmeta ; 150
    k: tap-hold-next k ; leftshift ; 150
    l: tap-hold-next l ; leftctrl ; 150
    semicolon: tap-hold-next semicolon ; leftalt ; 150

- name: qwerty
  passThrough: true
  bindings:
    leftalt: tap-hold layer initial ; toggle-layer system ; 200
    leftalt: tap-hold layer mouse ; toggle-layer system ; 200

    leftshift: tap-hold-next layer initial ; leftshift ; 200
    rightshift: tap-hold-next layer mouse ; rightshift ; 200

    esc: tap-hold esc ; capslock ; 400
    capslock: tap-hold-next esc ; leftctrl ; 200

- name: mouse
  passThrough: true
  bindings:
    leftalt: tap-hold layer query ; toggle-layer system ; 200
    leftalt: tap-hold layer initial ; toggle-layer system ; 200

    leftshift: tap-hold layer qwerty ; leftshift ; 200
    rightshift: tap-hold layer initial ; rightshift ; 200

    esc: tap-hold esc ; capslock ; 400
    capslock: tap-hold-next esc ; leftctrl ; 200

    r: reload-config

    l: move  1  0
    h: move -1  0
    j: move  0  1
    k: move  0 -1

    w: move  2  0
    b: move -2  0

    y: leftctrl+c
    c: leftctrl+leftshift+c
    v: leftctrl+leftshift+v

    p: scroll up
    n: scroll down

    u: speed 0.1
    i: speed 0.3
    o: speed 4.0

    f: button left
    d: button middle
    s: button right

- name: system
  passThrough: true
  bindings:
    p: tap-hold p ; power ; 300

    h: mute
    j: volumedown
    k: volumeup

    u: sleep
    i: wakeup
    o: screenlock
