
[language-server.ruff]
command = "ruff-lsp"
# config = { settings = { run = "onSave" } }

[[language]]
name = "python"
scope = "source.python"
language-servers = ["pylsp", "ruff"]

[language-server.nu-lsp]
command = "nu"
args = [ "--lsp" ]

[[language]]
name = "nu"
scope = "source.nu"
injection-regex = "nu"
file-types = ["nu"]
shebangs = ["nu"]
comment-token = "#"
indent = { tab-width = 2, unit = "  " }
# language-servers = [ "nu-lsp" ]

[[grammar]]
name = "nu"
source = { git = "https://github.com/nushell/tree-sitter-nu", rev = "26bbaecda0039df4067861ab38ea8ea169f7f5aa" }
